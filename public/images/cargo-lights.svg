<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Abstract illustration of a pickup truck with a cargo lamp lighting the bed and a small microcontroller chip">
  <defs>
    <radialGradient id="bedGlow" cx="0.5" cy="0.15" r="0.9">
      <stop offset="0%" stop-color="#e39a5f" stop-opacity="0.35" />
      <stop offset="55%" stop-color="#e39a5f" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#e39a5f" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="sceneGlow" cx="0.45" cy="0.5" r="0.75">
      <stop offset="0%" stop-color="#77e4c8" stop-opacity="0.08" />
      <stop offset="60%" stop-color="#77e4c8" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#77e4c8" stop-opacity="0" />
    </radialGradient>
    <pattern id="dotgrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" opacity="0.05" />
    </pattern>
  </defs>

  <rect width="800" height="500" fill="#08111f" />
  <rect width="800" height="500" fill="url(#dotgrid)" />
  <rect width="800" height="500" fill="url(#sceneGlow)" />

  <!-- glow of the cargo lamp over the bed -->
  <path d="M368 250 L600 250 L640 368 L340 368 Z" fill="url(#bedGlow)" />

  <!-- light rays from cargo lamp -->
  <g stroke="#e39a5f" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round">
    <line x1="372" y1="252" x2="420" y2="330" />
    <line x1="376" y1="250" x2="480" y2="316" />
    <line x1="380" y1="248" x2="530" y2="292" />
  </g>

  <!-- truck profile -->
  <g stroke="#77e4c8" stroke-width="2.5" fill="#ffffff" fill-opacity="0.04" stroke-linejoin="round">
    <path d="M130 368 V310 Q130 300 142 298 L235 288 L268 234 L352 230 L362 288 L368 290 L580 290 V368 H540 A48 48 0 0 0 444 368 L250 368 A48 48 0 0 0 154 368 Z" />
  </g>
  <!-- cab window -->
  <path d="M278 242 L344 239 L349 282 L262 282 Z" fill="#0d1b2f" stroke="#77e4c8" stroke-width="2" stroke-opacity="0.6" stroke-linejoin="round" />
  <!-- bed rail -->
  <line x1="368" y1="290" x2="580" y2="290" stroke="#77e4c8" stroke-width="2.5" />

  <!-- wheels -->
  <g fill="#0d1b2f" stroke="#77e4c8" stroke-width="2.5">
    <circle cx="202" cy="368" r="32" />
    <circle cx="492" cy="368" r="32" />
    <circle cx="202" cy="368" r="10" stroke-opacity="0.6" />
    <circle cx="492" cy="368" r="10" stroke-opacity="0.6" />
  </g>

  <!-- ground -->
  <line x1="80" y1="404" x2="720" y2="404" stroke="#77e4c8" stroke-opacity="0.25" stroke-width="2" />

  <!-- cargo lamp on cab rear -->
  <g>
    <rect x="358" y="242" width="18" height="12" rx="4" fill="#08111f" stroke="#e39a5f" stroke-width="2" />
    <circle cx="367" cy="248" r="2.5" fill="#e39a5f" />
  </g>

  <!-- microcontroller chip -->
  <g transform="translate(618 96)">
    <rect x="0" y="0" width="86" height="62" rx="10" fill="#08111f" stroke="#77e4c8" stroke-width="2" />
    <g stroke="#77e4c8" stroke-width="2" stroke-opacity="0.7">
      <line x1="14" y1="0" x2="14" y2="-12" />
      <line x1="34" y1="0" x2="34" y2="-12" />
      <line x1="54" y1="0" x2="54" y2="-12" />
      <line x1="74" y1="0" x2="74" y2="-12" />
      <line x1="14" y1="62" x2="14" y2="74" />
      <line x1="34" y1="62" x2="34" y2="74" />
      <line x1="54" y1="62" x2="54" y2="74" />
      <line x1="74" y1="62" x2="74" y2="74" />
    </g>
    <text x="43" y="39" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="20" font-weight="700" fill="#e39a5f">85</text>
  </g>

  <!-- signal line from chip toward lamp -->
  <path d="M618 140 C 520 160, 440 200, 380 240" fill="none" stroke="#77e4c8" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round" />
</svg>
